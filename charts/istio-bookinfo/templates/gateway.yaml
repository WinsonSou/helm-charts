{{- if .Values.gateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: bookinfo-gateway
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName | default "istio" }}
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    hostname: {{ .Values.gateway.hostname | quote }}
    allowedRoutes:
      namespaces:
        from: Same
  {{- if .Values.gateway.tls.enabled }}
  - name: https
    port: 443
    protocol: HTTPS
    hostname: {{ .Values.gateway.hostname | quote }}
    tls:
      mode: Terminate
      certificateRefs:
      - name: {{ .Values.gateway.tls.secretName }}
    allowedRoutes:
      namespaces:
        from: Same
  {{- end }}
{{- end }}
